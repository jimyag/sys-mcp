version: "3"

output: "prefixed"

vars:
  LINT_CMDS:
    - find . -name "*.go" ! -name "*.pb.go" -print0 | xargs -0 gofumpt -w
    - find . -name "*.go" ! -name "*.pb.go" -print0 | xargs -0 gofmt -w
    - go vet ./...
    - staticcheck $(go list ./... | grep -v '^github.com/jimyag/sysplane/api/tunnel$')

tasks:
  lint:
    desc: 执行所有代码检查 (gofumpt / gofmt / go vet / staticcheck)
    cmds:
      - go mod tidy
      - for: { var: LINT_CMDS, as: CMD }
        cmd: "{{.CMD}}"
        parallel: true
    silent: true
