version: "3"

output: "prefixed"

tasks:
  build:
    desc: "编译所有二进制到 bin/ (可指定平台: GO_OS=linux GO_ARCH=amd64 task build)"
    deps: [go-mod-tidy]
    vars:
      GO_OS: '{{.GO_OS | default OS}}'
      GO_ARCH: '{{.GO_ARCH | default ARCH}}'
      OUT_DIR: '{{.GO_BIN}}/{{.GO_OS}}_{{.GO_ARCH}}'
    cmds:
      - rm -rf {{.OUT_DIR}}
      - mkdir -p {{.OUT_DIR}}
      - |
        CGO_ENABLED=0 GOOS={{.GO_OS}} GOARCH={{.GO_ARCH}} \
        GOMODCACHE={{.GO_PATH}}/pkg/mod \
        go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.OUT_DIR}}/ ./cmd/...
      - |
        if [ "{{.GO_OS}}" == "{{OS}}" ] && [ "{{.GO_ARCH}}" == "{{ARCH}}" ]; then
          cp {{.OUT_DIR}}/sys-mcp-* {{.GO_BIN}}/
        fi

  go-mod-tidy:
    desc: go mod tidy
    internal: true
    run: once
    cmds:
      - go mod tidy
