version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: sys-mcp-center
    binary: sys-mcp-center
    main: ./cmd/sys-mcp-center
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X 'github.com/jimmicro/version.GitTag={{ .Tag }}'
      - -X 'github.com/jimmicro/version.BuildTime={{ .Date }}'

  - id: sys-mcp-proxy
    binary: sys-mcp-proxy
    main: ./cmd/sys-mcp-proxy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X 'github.com/jimmicro/version.GitTag={{ .Tag }}'
      - -X 'github.com/jimmicro/version.BuildTime={{ .Date }}'

  - id: sys-mcp-agent
    binary: sys-mcp-agent
    main: ./cmd/sys-mcp-agent
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X 'github.com/jimmicro/version.GitTag={{ .Tag }}'
      - -X 'github.com/jimmicro/version.BuildTime={{ .Date }}'

archives:
  - id: center
    ids: [sys-mcp-center]
    formats:
      - binary
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: proxy
    ids: [sys-mcp-proxy]
    formats:
      - binary
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: agent
    ids: [sys-mcp-agent]
    formats:
      - binary
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
