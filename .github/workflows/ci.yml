name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: go.sum

      - name: go mod tidy
        run: go mod tidy

      - name: go vet
        run: go vet ./...

      - name: go test
        run: |
          go test -trimpath -failfast -race -cover ./... \
            -coverprofile=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: go.sum

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" \
            -o dist/sys-mcp-center_${{ matrix.goos }}_${{ matrix.goarch }} \
            ./cmd/sys-mcp-center
          go build -trimpath -ldflags="-s -w" \
            -o dist/sys-mcp-proxy_${{ matrix.goos }}_${{ matrix.goarch }} \
            ./cmd/sys-mcp-proxy
          go build -trimpath -ldflags="-s -w" \
            -o dist/sys-mcp-agent_${{ matrix.goos }}_${{ matrix.goarch }} \
            ./cmd/sys-mcp-agent
